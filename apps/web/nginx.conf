server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Módulos ES (.mjs): deben servirse con MIME de JavaScript o el navegador
    # se niega a ejecutarlos (worker de render y AudioWorklet de AlphaTab).
    location ~* \.mjs$ {
        default_type text/javascript;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Ficheros estáticos: si no existen, 404 real (NO fallback a index.html,
    # que devolvería HTML con 200 y rompería workers/módulos silenciosamente).
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA: cualquier ruta desconocida sirve index.html (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
