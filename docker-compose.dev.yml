# Despliegue LOCAL de desarrollo.
#
# Diferencias frente a docker-compose.yml (producción):
#   • Metadatos en SQLite (un fichero en el volumen `dev-data`), sin DynamoDB.
#   • Ficheros en disco local (volumen `dev-data`), sin S3.
#   • AUTH_DISABLED=true → sin login ni registro: se entra directo como admin.
#   • Worker de audio (Audio Lab) que procesa la cola de jobs.
#
# Uso:
#   docker compose -f docker-compose.dev.yml up --build
#   → abrir http://localhost
#
# NO usar esta configuración en producción (no hay autenticación).

# Entorno compartido por la API y el worker (misma BD SQLite + mismo disco).
x-api-env: &api-env
  DB_BACKEND: sqlite
  SQLITE_PATH: /data/musix.db
  S3_BUCKET_NAME: ""
  FILES_DIR: /data/files
  SOUNDBANKS_DIR: /soundbanks
  AUTH_DISABLED: "true"
  ALLOW_REGISTRATION: "false"
  ADMIN_USERNAME: admin@local
  ADMIN_PASSWORD: admin
  SECRET_KEY: dev-insecure-secret-change-me-please-32b+
  ACCESS_TOKEN_EXPIRE_MINUTES: "10080"
  PUBLIC_BASE_URL: http://localhost
  ALLOWED_ORIGINS: http://localhost,http://127.0.0.1

x-api-volumes: &api-volumes
  # Persistencia local: SQLite (/data/musix.db) + ficheros (/data/files).
  - dev-data:/data
  # Soundbanks: lo que haya en ./soundbanks del host (sin sync desde S3).
  - ./soundbanks:/soundbanks

services:
  api:
    build:
      # Contexto = raíz del repo: el Dockerfile.dev necesita apps/api,
      # apps/score-engine y apps/web/alphatab-fork.tgz (sidecar AlphaTab).
      context: .
      dockerfile: apps/api/Dockerfile.dev
      args:
        # Engines de separación (Fase 4): pesados (torch). Pon "true" para instalarlos
        # (demucs + audio-separator). Off por defecto para builds rápidos.
        INSTALL_SEPARATION: "${INSTALL_SEPARATION:-false}"
        # Engines de transcripción mp3→MIDI (Fase 5): Basic Pitch (CPU, ONNX).
        INSTALL_TRANSCRIPTION: "${INSTALL_TRANSCRIPTION:-false}"
    image: musix-api-dev
    restart: unless-stopped
    environment: *api-env
    volumes: *api-volumes
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Worker del Audio Lab: toma jobs `queued` y los ejecuta (análisis/separación/
  # transcripción). Reutiliza la imagen de `api` y comparte BD + disco.
  audio-worker:
    image: musix-api-dev
    restart: unless-stopped
    command: ["python", "-m", "app.audio.worker"]
    environment: *api-env
    volumes: *api-volumes
    depends_on:
      - api

  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    depends_on:
      - api

  # Proxy local en :80 (sin TLS/ACME): / → web, /api/* → api.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - web

volumes:
  dev-data:
  caddy-data:
  caddy-config:
